name: Sync KB Data


on:
  workflow_dispatch:
    inputs:
      wiki:
        description: 'Sync Wiki'
        required: false
        default: 'true'
        type: boolean
      jira:
        description: 'Sync Jira'
        required: false
        default: 'true'
        type: boolean
      github:
        description: 'Sync GitHub'
        required: false
        default: 'true'
        type: boolean

jobs:
  sync-data-to-kb:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Sync data to KB
        env:
          GITHUB_REPO: ${{ secrets.GITHUB_REPO }}
          GITHUB_TOKEN: ${{ secrets.AGNES_GITHUB_TOKEN }}
          WIKI_SPACE: ${{ secrets.WIKI_SPACE }}
          CONFLUENCE_API_URL: ${{ secrets.CONFLUENCE_API_URL }}
          CONFLUENCE_USER: ${{ secrets.CONFLUENCE_USER }}
          CONFLUENCE_TOKEN: ${{ secrets.CONFLUENCE_TOKEN }}
          JIRA_PROJECT: ${{ secrets.JIRA_PROJECT }}
          JIRA_API_URL: ${{ secrets.JIRA_API_URL }}
          JIRA_USER: ${{ secrets.JIRA_USER }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
          VECTOR_KB_PATH: ./kb_data/sample_kb.json
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ARGS=""
            if [[ "${{ github.event.inputs.wiki }}" == "true" ]]; then ARGS="$ARGS --wiki"; fi
            if [[ "${{ github.event.inputs.jira }}" == "true" ]]; then ARGS="$ARGS --jira"; fi
            if [[ "${{ github.event.inputs.github }}" == "true" ]]; then ARGS="$ARGS --github"; fi
            if [[ -z "$ARGS" ]]; then ARGS="--github"; fi
            echo "Manual trigger: python sync_data_to_kb.py $ARGS"
            python sync_data_to_kb.py $ARGS
          else
            echo "Scheduled trigger: python sync_data_to_kb.py"
            python sync_data_to_kb.py
          fi
